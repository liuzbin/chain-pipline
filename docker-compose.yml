version: '3.8'

services:
  # ==========================================
  # project 1：tx-sentry
  # ==========================================
  
  # 1. Citus PostgreSQL
  citus-master:
    image: citusdata/citus:12.1
    container_name: citus-master
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_password
      - POSTGRES_DB=tx_sentry
    volumes:
      - citus-data:/var/lib/postgresql/data
    networks:
      - web3-net

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - web3-net

  # ==========================================
  # project 2：chain-pipline
  # ==========================================

  # 3. Zookeeper 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - web3-net

  # 4. Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 配置内外网双重监听：容器内部用 kafka:29092，你的 Windows 宿主机用 localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - web3-net

  # 5.1 ClickHouse 节点 1
  clickhouse1:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse1
    depends_on:
      - zookeeper
    ports:
      - "8123:8123" # 节点1的 HTTP 端口
      - "9000:9000" # 节点1的 Native 端口
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=root
    volumes:
      - clickhouse1-data:/var/lib/clickhouse
      # 把刚才建的集群配置挂载进去
      - ./ch-cluster.xml:/etc/clickhouse-server/config.d/ch-cluster.xml
    networks:
      - web3-net

  # 5.2 ClickHouse 节点 2
  clickhouse2:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse2
    depends_on:
      - zookeeper
    ports:
      - "8124:8123" # 注意：宿主机端口不能冲突，映射成 8124
      - "9002:9000" # 映射成 9001
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=root
    volumes:
      - clickhouse2-data:/var/lib/clickhouse
      # 同样的集群配置挂载进去
      - ./ch-cluster.xml:/etc/clickhouse-server/config.d/ch-cluster.xml
    networks:
      - web3-net

  # 6. MinIO 
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9005:9000" # S3 API 端口 (避开与 ClickHouse 的 9000 端口冲突)
      - "9001:9001" # Web 控制台端口
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - web3-net
  
  # ==========================================
  # Infrastructure Monitoring
  # ==========================================

  # 7. Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      # 将宿主机的配置文件映射到容器内
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # 持久化 Prometheus 采集的时序数据
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - web3-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=Local-Cluster
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - web3-net

# 统一定义数据卷，保证即使你重启电脑或销毁容器，数据依然存在
volumes:
  citus-data:
  redis-data:
  kafka-data:
  clickhouse1-data:
  clickhouse2-data:
  minio-data:
  prometheus-data:

# 统一定义内部网络，所有容器可以通过容器名互相 Ping 通
networks:
  web3-net:
    driver: bridge